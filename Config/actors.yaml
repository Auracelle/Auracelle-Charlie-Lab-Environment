# ── Auracelle Charlie — Actor definitions ────────────────────────────────────
# Each actor carries:
#   gdp          : GDP in USD trillions (baseline; overwritten by World Bank API)
#   influence    : normalised influence score 0–1
#   position     : short-form policy stance description
#   mil_exp      : military expenditure as % of GDP (baseline)
#   internet     : internet penetration % (baseline)
#   cultural_alignment : broad cultural bloc label
#   iso3         : ISO 3166-1 alpha-3 code (used for World Bank / Comtrade calls)
#
# Baseline values are defaults only; the simulation loads live World Bank data
# at session start and overwrites gdp / mil_exp / internet where available.

