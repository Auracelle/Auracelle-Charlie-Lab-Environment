# ── Auracelle Charlie — Policy scenario definitions ───────────────────────────
# Each entry has:
#   label       : display name (shown in selectbox)
#   short_id    : slug used in session state / logging
#   brief       : scenario explanation shown to players
#   domain      : thematic domain tag

policies:
  - label: "EU Artificial Intelligence Act (AI Act) - Regulation (EU) 2024/1689"
    short_id: eu_ai_act
    domain: AI Governance
    brief: >
      Risk-tiering, high-risk controls, governance obligations — perfect for
      stress-testing compliance, innovation tradeoffs, and cross-border adoption.

  - label: "EU General Data Protection Regulation (GDPR) - Regulation (EU) 2016/679"
    short_id: gdpr
    domain: Data Governance
    brief: >
      The global reference point for privacy, data rights, and cross-border data
      governance (and it directly collides with AI training / data minimisation debates).

  - label: "EU Digital Services Act (DSA) - Regulation (EU) 2022/2065"
    short_id: dsa
    domain: Platform Regulation
    brief: >
      Platform accountability and systemic-risk controls — useful for
      stress-testing content moderation, transparency, and disinformation
      pressures in a crisis.

  - label: "EU NIS2 Directive - Directive (EU) 2022/2555"
    short_id: nis2
    domain: Cybersecurity
    brief: >
      Cybersecurity governance obligations for critical and important entities —
      ideal for stress-testing incident response, resilience duties, and
      cross-border coordination under attack.

  - label: "UNESCO Recommendation on the Ethics of Artificial Intelligence (2021)"
    short_id: unesco_ai_ethics
    domain: AI Ethics
    brief: >
      A global ethical baseline for AI — useful for stress-testing value conflicts,
      implementation gaps, and alignment across diverse governance cultures.

  - label: "OECD Recommendation of the Council on Artificial Intelligence (OECD AI Principles, 2019)"
    short_id: oecd_ai
    domain: AI Governance
    brief: >
      Widely adopted principles (robustness, transparency, accountability) — useful
      for stress-testing practical translation of norms into enforceable controls
      and incentives.

  - label: "American AI Action Plan"
    short_id: us_ai_action
    domain: National AI Strategy
    brief: >
      A U.S.-anchored strategic blueprint for advancing AI while managing risks —
      useful for stress-testing national competitiveness vs safety, procurement,
      and cross-sector adoption tradeoffs.

  - label: "NATO Article 5"
    short_id: nato_art5
    domain: Collective Defence
    brief: >
      Collective defense clause — useful for stress-testing alliance
      decision-making if AI-enabled cyber incidents or escalation pressures
      trigger collective response debates.

  - label: "Political Declaration on Responsible Military Use of Artificial Intelligence and Autonomy (2023)"
    short_id: pol_dec_mil_ai_2023
    domain: Military AI Governance
    brief: >
      Closest real-world anchor for a dedicated AI incident reporting and
      deconfliction protocol. Useful for stress-testing crisis communication,
      incident disclosure, escalation restraint, and allied or adversarial
      signaling under wartime pressure.

  - label: "U.S. Department of Defense Directive 3000.09 - Autonomy in Weapon Systems"
    short_id: dod_3000_09
    domain: Military AI Governance
    brief: >
      Closest real-world anchor for a human command threshold policy. Useful for
      stress-testing when high-risk or escalatory AI-enabled decisions must remain
      within a responsible human chain of command despite speed, ambiguity, and
      retaliation pressure.

  - label: "NATO Revised AI Strategy (2024) + Data Quality Framework for the Alliance"
    short_id: nato_ai_strategy_2024
    domain: AI Governance
    brief: >
      Closest real-world anchor for a coalition AI assurance and interoperability
      standard. Useful for stress-testing allied assurance baselines, data-sharing
      trust, model assurance, interoperability, and coalition coordination under
      pressure.

  - label: "U.S. BIS Export Administration Regulations - Advanced Computing, AI Model Weights, and Semiconductor Controls"
    short_id: bis_ear_ai_compute
    domain: Export Controls
    brief: >
      Closest real-world anchor for an AI export controls, model access, and
      sanctions policy. Useful for stress-testing compute chokepoints, model access
      restrictions, sanctions evasion, partner dependence, and supply-chain
      resilience.
